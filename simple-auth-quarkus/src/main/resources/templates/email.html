<!DOCTYPE html>
<html lang="sk">
<head>
    <title>{title}</title>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type"/>
</head>
<body>
    <header>
        <h1>{title}</h1>
    </header>
    {#for line in lines}
    <main>
        <p>{line}</p>
    </main>
    {/for}
    {#if isLink}
    <footer>
        <a href="{linkHref}">{linkText}</a>
    </footer>
    {/if}
</body>
</html>
